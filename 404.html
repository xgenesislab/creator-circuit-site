<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex" />
    <title>Redirecting to Creator Circuit HQ</title>
    <script>
      (function redirectPagesRoute(location) {
        var segmentsToKeep = 1;
        var segments = location.pathname.split('/');
        var base = segments.slice(0, 1 + segmentsToKeep).join('/');
        var route = segments.slice(1 + segmentsToKeep).join('/').replace(/&/g, '~and~');
        var query = location.search ? '&' + location.search.slice(1).replace(/&/g, '~and~') : '';
        location.replace(location.protocol + '//' + location.hostname + (location.port ? ':' + location.port : '') + base + '/?/' + route + query + location.hash);
      }(window.location));
    </script>
  </head>
  <body></body>
</html>
